name: release

# Publishes to crates.io when a GitHub Release is published.
# Requires a repository secret CARGO_REGISTRY_TOKEN (a crates.io API token
# with the "publish-update" / "publish-new" scopes).
on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --all-targets

      - name: Verify tag matches Cargo.toml version
        if: github.event_name == 'release'
        run: |
          cargo_version="$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')"
          tag="${GITHUB_REF_NAME#v}"
          echo "Cargo.toml=$cargo_version  tag=$tag"
          if [ "$cargo_version" != "$tag" ]; then
            echo "::error::Release tag ($tag) does not match Cargo.toml version ($cargo_version)"
            exit 1
          fi

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
